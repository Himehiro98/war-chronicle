name: Update Live Conflict Data

on:
  # 毎週月曜 9:00 JST (UTC 00:00) に自動実行
  schedule:
    - cron: '0 0 * * 1'
  # 手動実行ボタン
  workflow_dispatch:
    inputs:
      reason:
        description: '更新理由（任意）'
        required: false
        default: '手動更新'

jobs:
  update-live-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update last-updated date in live-conflicts.ts
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          echo "Updating LIVE_DATA_UPDATED to $TODAY"
          sed -i "s/export const LIVE_DATA_UPDATED = '[0-9-]*'/export const LIVE_DATA_UPDATED = '$TODAY'/" lib/live-conflicts.ts
          echo "Updated successfully"
        working-directory: .

      - name: Check if file was modified
        id: check_changes
        run: |
          if git diff --quiet lib/live-conflicts.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lib/live-conflicts.ts
          git commit -m "chore: update live conflict data timestamp $(date -u +%Y-%m-%d)"
          git push

      - name: Summary
        run: |
          echo "## Live Data Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "Updated: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "Changes committed: ${{ steps.check_changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 手動でデータを更新するには" >> $GITHUB_STEP_SUMMARY
          echo "1. \`lib/live-conflicts.ts\` の各紛争の数値を更新" >> $GITHUB_STEP_SUMMARY
          echo "2. \`latestDevelopment\` と \`latestDate\` フィールドを編集" >> $GITHUB_STEP_SUMMARY
          echo "3. このワークフローを手動実行してタイムスタンプを更新" >> $GITHUB_STEP_SUMMARY
